name: Playwright Tests with Allure Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npm run test
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        USER_EMAIL : ${{ secrets.LOGIN }}
        USER_PASSWORD: ${{ secrets.PASSWORD }}
        HEADLESS: ${{ secrets.HEADLESS }}
        RETRIES: ${{ secrets.RETRIES }}
        TIMEOUT: ${{ secrets.TIMEOUT }}
        CI: true
      continue-on-error: true

    - name: Load Allure history from gh-pages
      uses: actions/checkout@v4
      if: always()
      with:
        ref: gh-pages
        path: gh-pages
      continue-on-error: true 

    - name: Build Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      id: allure-report
      with:
        allure_results: allure-results
        gh_pages: gh-pages
        allure_report: allure-report
        allure_history: allure-history

    - name: Upload Allure HTML Report as Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-report-artifact
        path: allure-report
        retention-days: 10

    - name: Deploy Allure Report to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      if: always()
      with:
        branch: gh-pages
        folder: allure-history
        clean: true
        commit-message: "Deploy Allure Report - ${{ github.sha }}" 